<svg width="1600" height="980" viewBox="0 0 1600 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="980" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F6F8FC"/>
      <stop offset="1" stop-color="#E8EEF8"/>
    </linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#184E77"/>
      <stop offset="1" stop-color="#1E6091"/>
    </linearGradient>
    <linearGradient id="ingest" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFF3D6"/>
      <stop offset="1" stop-color="#FDE2A7"/>
    </linearGradient>
    <linearGradient id="runtime" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#DDF6E8"/>
      <stop offset="1" stop-color="#BEEACF"/>
    </linearGradient>
    <linearGradient id="external" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#E8E1FF"/>
      <stop offset="1" stop-color="#D3C5FF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#24415D" flood-opacity="0.14"/>
    </filter>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1E6091"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2D6A4F"/>
    </marker>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5C677D"/>
    </marker>
    <style>
      .title { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: #FFFFFF; }
      .subtitle { font: 400 17px 'Segoe UI', Arial, sans-serif; fill: #D9E6F2; }
      .sectionTitle { font: 700 24px 'Segoe UI', Arial, sans-serif; fill: #17324D; }
      .boxTitle { font: 700 22px 'Segoe UI', Arial, sans-serif; fill: #17324D; }
      .boxText { font: 400 16px 'Segoe UI', Arial, sans-serif; fill: #334E68; }
      .miniTitle { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #17324D; }
      .miniText { font: 400 14px 'Segoe UI', Arial, sans-serif; fill: #486581; }
      .label { font: 700 15px 'Segoe UI', Arial, sans-serif; fill: #1E6091; letter-spacing: 0.04em; }
      .note { font: 400 15px 'Segoe UI', Arial, sans-serif; fill: #5C677D; }
      .chip { font: 700 14px 'Segoe UI', Arial, sans-serif; fill: #17324D; }
    </style>
  </defs>

  <rect width="1600" height="980" fill="url(#bg)"/>

  <rect x="48" y="36" width="1504" height="120" rx="28" fill="url(#header)" filter="url(#shadow)"/>
  <text x="88" y="88" class="title">Confident Group RAG Chatbot Architecture</text>
  <text x="88" y="122" class="subtitle">FastAPI + LangChain + FAISS + Sentence Transformers + Groq/Ollama + Streamlit</text>

  <rect x="58" y="194" width="618" height="730" rx="28" fill="#FFFFFF" stroke="#D9E2EC" stroke-width="2" filter="url(#shadow)"/>
  <text x="92" y="240" class="sectionTitle">Offline Ingestion Flow</text>
  <text x="92" y="268" class="note">Builds the searchable knowledge base from company content</text>

  <rect x="92" y="304" width="550" height="106" rx="22" fill="url(#ingest)" stroke="#E9C46A" stroke-width="2"/>
  <text x="120" y="345" class="boxTitle">1. Source Documents</text>
  <text x="120" y="375" class="boxText">PDFs from `data/confident_docs/`</text>
  <text x="120" y="399" class="boxText">Optional website pages from `WEBSITE_URLS`</text>

  <rect x="92" y="452" width="550" height="116" rx="22" fill="#FFFDF6" stroke="#E9C46A" stroke-width="2"/>
  <text x="120" y="493" class="boxTitle">2. Document Loader</text>
  <text x="120" y="523" class="boxText">`app/document_loader.py` loads PDFs with `PyPDFLoader`</text>
  <text x="120" y="547" class="boxText">Website text is fetched with `requests` and parsed via BeautifulSoup</text>

  <rect x="92" y="610" width="550" height="116" rx="22" fill="#FFFDF6" stroke="#E9C46A" stroke-width="2"/>
  <text x="120" y="651" class="boxTitle">3. Chunking + Embeddings</text>
  <text x="120" y="681" class="boxText">`RecursiveCharacterTextSplitter` creates chunks</text>
  <text x="120" y="705" class="boxText">`sentence-transformers/all-MiniLM-L6-v2` turns chunks into vectors</text>

  <rect x="92" y="768" width="550" height="116" rx="22" fill="#FFFDF6" stroke="#E9C46A" stroke-width="2"/>
  <text x="120" y="809" class="boxTitle">4. Vector Index Persistence</text>
  <text x="120" y="839" class="boxText">`app/vector_store.py` builds a FAISS index from chunk embeddings</text>
  <text x="120" y="863" class="boxText">Saved to `data/faiss_index/` for runtime retrieval</text>

  <path d="M367 410 L367 452" stroke="#1E6091" stroke-width="4" marker-end="url(#arrowBlue)"/>
  <path d="M367 568 L367 610" stroke="#1E6091" stroke-width="4" marker-end="url(#arrowBlue)"/>
  <path d="M367 726 L367 768" stroke="#1E6091" stroke-width="4" marker-end="url(#arrowBlue)"/>

  <rect x="724" y="194" width="828" height="730" rx="28" fill="#FFFFFF" stroke="#D9E2EC" stroke-width="2" filter="url(#shadow)"/>
  <text x="758" y="240" class="sectionTitle">Online Question Answering Flow</text>
  <text x="758" y="268" class="note">Handles user chat requests using retrieval-augmented generation</text>

  <rect x="758" y="304" width="220" height="122" rx="22" fill="#F8FBFF" stroke="#8AB6D6" stroke-width="2"/>
  <text x="785" y="347" class="boxTitle">Streamlit UI</text>
  <text x="785" y="377" class="boxText">`ui/chat_ui.py`</text>
  <text x="785" y="401" class="boxText">Chat history + request handling</text>

  <rect x="1038" y="304" width="220" height="122" rx="22" fill="#F8FBFF" stroke="#8AB6D6" stroke-width="2"/>
  <text x="1065" y="347" class="boxTitle">FastAPI API</text>
  <text x="1065" y="377" class="boxText">`app/main.py`</text>
  <text x="1065" y="401" class="boxText">`POST /chat`, `GET /health`</text>

  <rect x="1318" y="304" width="200" height="122" rx="22" fill="#F8FBFF" stroke="#8AB6D6" stroke-width="2"/>
  <text x="1345" y="347" class="boxTitle">RAG Pipeline</text>
  <text x="1345" y="377" class="boxText">`app/rag_pipeline.py`</text>
  <text x="1345" y="401" class="boxText">Retrieve + prompt + answer</text>

  <path d="M978 365 L1038 365" stroke="#1E6091" stroke-width="4" marker-end="url(#arrowBlue)"/>
  <path d="M1258 365 L1318 365" stroke="#1E6091" stroke-width="4" marker-end="url(#arrowBlue)"/>

  <rect x="758" y="484" width="340" height="166" rx="24" fill="url(#runtime)" stroke="#74C69D" stroke-width="2"/>
  <text x="788" y="526" class="boxTitle">Retrieval Layer</text>
  <text x="788" y="558" class="boxText">Question is embedded using the same embedding model</text>
  <text x="788" y="584" class="boxText">Top-K semantic matches are fetched from the FAISS index</text>
  <text x="788" y="610" class="boxText">Retrieved chunks are formatted into grounded context</text>

  <rect x="1142" y="484" width="376" height="166" rx="24" fill="url(#runtime)" stroke="#74C69D" stroke-width="2"/>
  <text x="1172" y="526" class="boxTitle">Generation Layer</text>
  <text x="1172" y="558" class="boxText">Prompt includes context + user question + system instruction</text>
  <text x="1172" y="584" class="boxText">LLM answers only from retrieved context when possible</text>
  <text x="1172" y="610" class="boxText">Returns grounded response to API and then back to the UI</text>

  <path d="M1418 426 L1418 484" stroke="#2D6A4F" stroke-width="4" marker-end="url(#arrowGreen)"/>
  <path d="M928 484 C928 448 1260 448 1260 426" stroke="#2D6A4F" stroke-width="4" fill="none" marker-end="url(#arrowGreen)"/>

  <rect x="758" y="706" width="250" height="166" rx="24" fill="#FFFFFF" stroke="#9FB3C8" stroke-width="2"/>
  <text x="788" y="748" class="miniTitle">Embedding Model</text>
  <text x="788" y="778" class="miniText">`app/embeddings.py`</text>
  <text x="788" y="804" class="miniText">SentenceTransformer wrapper</text>
  <text x="788" y="828" class="miniText">Used during ingestion and query time</text>

  <rect x="1030" y="706" width="250" height="166" rx="24" fill="#FFFFFF" stroke="#9FB3C8" stroke-width="2"/>
  <text x="1060" y="748" class="miniTitle">FAISS Vector Store</text>
  <text x="1060" y="778" class="miniText">`app/vector_store.py`</text>
  <text x="1060" y="804" class="miniText">Loads saved index from disk</text>
  <text x="1060" y="828" class="miniText">Runs similarity search for context</text>

  <rect x="1302" y="706" width="216" height="166" rx="24" fill="url(#external)" stroke="#9D79D6" stroke-width="2"/>
  <text x="1332" y="748" class="miniTitle">LLM Provider</text>
  <text x="1332" y="778" class="miniText">Groq API by default</text>
  <text x="1332" y="804" class="miniText">Optional Ollama fallback</text>
  <text x="1332" y="828" class="miniText">Config-driven provider choice</text>

  <path d="M883 706 L883 650" stroke="#5C677D" stroke-width="4" marker-end="url(#arrowGray)"/>
  <path d="M1155 706 L1155 650" stroke="#5C677D" stroke-width="4" marker-end="url(#arrowGray)"/>
  <path d="M1410 706 L1410 650" stroke="#5C677D" stroke-width="4" marker-end="url(#arrowGray)"/>

  <path d="M642 826 C740 826 698 789 758 789" stroke="#1E6091" stroke-width="4" fill="none" marker-end="url(#arrowBlue)"/>
  <text x="645" y="798" class="label">LOAD INDEX AT STARTUP</text>

  <rect x="620" y="96" width="178" height="36" rx="18" fill="#D9F0FF"/>
  <text x="650" y="120" class="chip">LOCAL DEVELOPMENT</text>

  <rect x="816" y="96" width="214" height="36" rx="18" fill="#E7F8EC"/>
  <text x="848" y="120" class="chip">RUNTIME RETRIEVAL FLOW</text>

  <rect x="1050" y="96" width="220" height="36" rx="18" fill="#FFF3D6"/>
  <text x="1082" y="120" class="chip">OFFLINE INDEX BUILD FLOW</text>

  <text x="92" y="947" class="note">Configurable through `.env`: model, embedding model, chunk size, overlap, top-k, backend URL, and provider settings.</text>
</svg>
